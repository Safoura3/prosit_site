<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <a class="logo" href="../index.php">le<span>bonplan</span></a>
            <button class="nav-toggle" aria-label="Ouvrir le menu" aria-expanded="false">&#9776;</button>

                    <a class="btn btn-ghost" href="connexion.html">Connexion</a>
                    <a class="btn btn-primary" href="inscription.html">Inscription</a>
                </span>
            </nav>
        </div>
    </header>

    <main>
        <div class="card wide">
            <h1>Contactez-nous</h1>
            <p class="subtitle">Une question ? Remplissez le formulaire, tous les champs sont obligatoires.</p>
            <form id="contactForm" novalidate>
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" required>
                <span class="error-message" id="nomError"></span>

                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom" required>
                <span class="error-message" id="prenomError"></span>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <span class="error-message" id="emailError"></span>

                <label for="telephone">Téléphone</label>
                <input type="tel" id="telephone" name="telephone" pattern="[0-9]{10}" required>
                <span class="error-message" id="telephoneError"></span>

                <label for="sujet">Sujet</label>
                <select id="sujet" name="sujet" required>
                    <option value="">Sélectionnez un sujet</option>
                    <option value="support">Problèmes techniques</option>
                    <option value="vente">FAQ</option>
                    <option value="autre">Autre</option>
                </select>
                <span class="error-message" id="sujetError"></span>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                <span class="error-message" id="messageError"></span>

                <div class="check-row">
                    <input type="checkbox" id="consentement" name="consentement" required>
                    <label for="consentement">J'accepte que mes données soient utilisées conformément à la politique de confidentialité.</label>
                </div>
                <span class="error-message" id="consentementError"></span>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Envoyer</button>
                </div>
            </form>

            <div id="notification" class="notification" style="display: none;">
                Votre message a bien été envoyé. Nous vous répondrons dans les plus brefs délais.
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">&copy; 2025 lebonplan — <a href="mention.html">Mentions légales</a></div>
    </footer>

    <script src="app.js"></script>
    <script src="contact.js"></script>
</body>
</html>
